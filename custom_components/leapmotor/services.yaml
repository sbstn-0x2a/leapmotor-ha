set_charge_limit:
  name: Set charge limit
  description: Set the charging upper limit while preserving the current charging schedule from the vehicle.
  fields:
    charge_limit_percent:
      name: Charge limit
      description: New upper charge limit in percent.
      required: true
      example: 85
      selector:
        number:
          min: 1
          max: 100
          mode: box
    vin:
      name: VIN
      description: Target VIN. Required when multiple vehicles are configured.
      selector:
        text:
    entity_id:
      name: Entity ID
      description: Optional Leapmotor entity to resolve the target vehicle.
      selector:
        text:
send_destination:
  name: Send destination
  description: Send a navigation destination to the vehicle.
  fields:
    name:
      name: Destination name
      description: Short destination label shown in the vehicle navigation.
      required: true
      example: Bern
      selector:
        text:
    address:
      name: Address
      description: Full destination address. Defaults to the destination name when omitted.
      example: Bern, Schweiz
      selector:
        text:
    latitude:
      name: Latitude
      description: Destination latitude.
      required: true
      example: 46.9479739
      selector:
        number:
          min: -90
          max: 90
          mode: box
    longitude:
      name: Longitude
      description: Destination longitude.
      required: true
      example: 7.4474468
      selector:
        number:
          min: -180
          max: 180
          mode: box
    vin:
      name: VIN
      description: Target VIN. Required when multiple vehicles are configured.
      selector:
        text:
    entity_id:
      name: Entity ID
      description: Optional Leapmotor entity to resolve the target vehicle.
      selector:
        entity:
          integration: leapmotor
