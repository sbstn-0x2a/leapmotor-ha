lock:
  name: Lock vehicle
  description: Lock a Leapmotor vehicle. Requires the configured Vehicle PIN.
  fields:
    vin:
      name: VIN
      description: Target VIN. Required when multiple vehicles are configured.
      example: LPXXXXXXXXXXXXXXX
      selector:
        text:
    entity_id:
      name: Entity ID
      description: Optional Leapmotor entity to resolve the target vehicle.
      example: lock.leapmotor_vehicle_lock
      selector:
        text:
