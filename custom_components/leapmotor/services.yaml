sunshade_open:
  name: Open sunshade
  description: Open the sunshade. Requires the configured Vehicle PIN. Optionally set a partial position from 0 to 10; omit for fully open.
  fields:
    value:
      name: Position
      description: Optional sunshade position, 0 to 10. Omit for fully open.
      example: 5
      selector:
        number:
          min: 0
          max: 10
          step: 1
          mode: box
    vin:
      name: VIN
      description: Target VIN. Required when multiple vehicles are configured.
      selector:
        text:
    entity_id:
